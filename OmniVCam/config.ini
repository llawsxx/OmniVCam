[config] #此配置文件重启软件后生效
hw_decode=none #设置硬解，可选none、dxva2、d3d11va、cuda、qsv
tcp_port=16999 #TCP控制端口，需与控制器Port一致
log_level=error  #日志级别，有"quiet"  "panic"  "fatal"  "error"  "warning" "info"   "verbose"   "debug"  "trace" （暂未实现输出日志）
video_frame_buffer=30 #视频帧缓存数量，数值低内存占用小，但可能容易卡
audio_frame_buffer=50 #音频帧缓存数量，数值低内存占用小，但可能容易卡
packet_queue_size=52428800
timeout=30000000
use_fixed_frame_interval=1 #采用固定帧间隔计算下一帧时间，以适配OBS
ajust_start_time_if_delay_over=10  #输出延迟超过这个帧数后重设时间
av_max_offset_time=5000000 #音视频输入时间戳与输出时间戳的最大偏移值，如有超低帧率素材（如低于0.2fps），需调高这项